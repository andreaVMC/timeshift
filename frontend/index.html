<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TimeShift — Gestione Ore</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
    .nav-btn { transition: background 0.15s, color 0.15s; }
    .nav-btn.active { background: #4F46E5 !important; color: #fff !important; }
    .cal-cell { min-height: 96px; }
    .chip { font-size: 0.68rem; line-height: 1.2; }
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }
  </style>
</head>
<body class="bg-slate-100">

<!-- ═══════════════════════════════ LOGIN ═══════════════════════════════ -->
<div id="login-screen" class="hidden fixed inset-0 bg-slate-100 z-[100] flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8">
    <div class="flex items-center gap-3 mb-8 justify-center">
      <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center text-white font-bold text-lg">T</div>
      <div>
        <h1 class="text-slate-900 font-bold text-xl leading-tight">TimeShift</h1>
        <p class="text-slate-400 text-xs">Accedi per continuare</p>
      </div>
    </div>
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="mb-4">
        <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
        <input id="login-username" type="text" required autofocus
          class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none text-sm" />
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input id="login-password" type="password" required
          class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none text-sm" />
      </div>
      <p id="login-error" class="hidden text-red-500 text-sm mb-4 text-center"></p>
      <button type="submit" id="login-btn"
        class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-semibold py-2.5 rounded-xl text-sm transition-colors">
        Accedi
      </button>
    </form>
  </div>
</div>

<!-- ═══════════════════════════════ SIDEBAR ═══════════════════════════════ -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-60 bg-slate-900 flex flex-col z-30 shadow-xl">
  <div class="px-6 py-7 border-b border-slate-700/60">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-indigo-500 rounded-xl flex items-center justify-center text-white font-bold text-lg">T</div>
      <div>
        <h1 class="text-white font-bold text-base leading-tight">TimeShift</h1>
        <p class="text-slate-400 text-xs">Ore, Clienti & Finanze</p>
      </div>
    </div>
  </div>

  <nav class="flex-1 px-3 py-4 space-y-1">
    <button onclick="navigate('dashboard')" id="nav-dashboard"
      class="nav-btn w-full text-left px-4 py-2.5 rounded-xl text-slate-300 hover:bg-slate-800 flex items-center gap-3 text-sm font-medium">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Dashboard
    </button>
    <button onclick="navigate('calendar')" id="nav-calendar"
      class="nav-btn w-full text-left px-4 py-2.5 rounded-xl text-slate-300 hover:bg-slate-800 flex items-center gap-3 text-sm font-medium">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      Calendario
    </button>
    <button onclick="navigate('clients')" id="nav-clients"
      class="nav-btn w-full text-left px-4 py-2.5 rounded-xl text-slate-300 hover:bg-slate-800 flex items-center gap-3 text-sm font-medium">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      Clienti
    </button>
    <button onclick="navigate('sessions')" id="nav-sessions"
      class="nav-btn w-full text-left px-4 py-2.5 rounded-xl text-slate-300 hover:bg-slate-800 flex items-center gap-3 text-sm font-medium">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      Sessioni
    </button>

    <div class="mt-4 mb-2 px-4">
      <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Finanze</p>
    </div>
    <button onclick="navigate('accounts')" id="nav-accounts"
      class="nav-btn w-full text-left px-4 py-2.5 rounded-xl text-slate-300 hover:bg-slate-800 flex items-center gap-3 text-sm font-medium">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
      Conti
    </button>
    <button onclick="navigate('transactions')" id="nav-transactions"
      class="nav-btn w-full text-left px-4 py-2.5 rounded-xl text-slate-300 hover:bg-slate-800 flex items-center gap-3 text-sm font-medium">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>
      Movimenti
    </button>
    <button onclick="navigate('categories')" id="nav-categories"
      class="nav-btn w-full text-left px-4 py-2.5 rounded-xl text-slate-300 hover:bg-slate-800 flex items-center gap-3 text-sm font-medium">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/></svg>
      Categorie
    </button>
  </nav>

  <div class="px-3 py-3 border-t border-slate-700/60 space-y-1">
    <button onclick="openSettings()"
      class="nav-btn w-full text-left px-4 py-2 rounded-xl text-slate-400 hover:bg-slate-800 flex items-center gap-3 text-xs font-medium">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      Account
    </button>
    <button onclick="handleLogout()"
      class="nav-btn w-full text-left px-4 py-2 rounded-xl text-red-400 hover:bg-slate-800 flex items-center gap-3 text-xs font-medium">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Esci
    </button>
    <button onclick="exportData()"
      class="nav-btn w-full text-left px-4 py-2 rounded-xl text-slate-400 hover:bg-slate-800 flex items-center gap-3 text-xs font-medium">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
      Esporta Dati
    </button>
    <button onclick="document.getElementById('import-file').click()"
      class="nav-btn w-full text-left px-4 py-2 rounded-xl text-slate-400 hover:bg-slate-800 flex items-center gap-3 text-xs font-medium">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
      Importa Dati
    </button>
    <input type="file" id="import-file" accept=".json" class="hidden" onchange="importData(event)" />
    <p class="text-slate-500 text-xs text-center pt-1">TimeShift v2.0</p>
  </div>
</aside>

<!-- ═══════════════════════════════ CONTENT ═══════════════════════════════ -->
<main class="ml-60 min-h-screen">
  <!-- Loading overlay -->
  <div id="loading" class="fixed inset-0 ml-60 bg-slate-100 z-20 flex items-center justify-center">
    <div class="text-center">
      <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
      <p class="text-slate-500 text-sm">Caricamento...</p>
    </div>
  </div>
  <div id="content" class="p-8"></div>
</main>

<!-- ═══════════════════════════════ MODAL ═════════════════════════════════ -->
<div id="modal-overlay" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
  <div id="modal-box" class="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto">
    <div id="modal-body"></div>
  </div>
</div>

<!-- ═══════════════════════════════ TOAST ═════════════════════════════════ -->
<div id="toast" class="hidden fixed bottom-6 right-6 px-5 py-3 rounded-xl text-white text-sm font-medium z-50 shadow-xl flex items-center gap-2"></div>

<!-- ═══════════════════════════════ SCRIPTS ════════════════════════════════ -->
<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const API = '/api';

const PALETTE = [
  '#6366F1','#EC4899','#10B981','#F59E0B',
  '#EF4444','#3B82F6','#8B5CF6','#14B8A6',
  '#F97316','#06B6D4','#84CC16','#A855F7'
];

const MONTHS_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                   'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

// ─── State ────────────────────────────────────────────────────────────────────
let clients  = [];
let sessions = [];
let stats    = null;
let accounts = [];
let transactions = [];
let finStats = null;
let calDate  = new Date();
let view     = 'dashboard';
let charts   = {};
// Filtri (persistono nella sessione)
let dashboardMonth = '';        // '' = tutti i tempi, 'YYYY-MM' = mese specifico
let includePendingInTotal = true; // se true, "Guadagno Totale" include lavoro non ancora pagato
let sessionsMonth = '';
let transactionsMonth = '';

// ─── Finance categories (dynamic from API) ──────────────────────────────────
let categoriesData = [];
function EXPENSE_CATS() { return categoriesData.filter(c=>c.type==='expense').map(c=>c.name); }
function INCOME_CATS()  { return categoriesData.filter(c=>c.type==='income').map(c=>c.name); }
function CAT_COLORS()   {
  const m = {};
  categoriesData.forEach(c => { m[c.name] = c.color; });
  return m;
}
function catColor(name) { const c = categoriesData.find(x=>x.name===name); return c?.color || '#94A3B8'; }

// ─── Utilities ────────────────────────────────────────────────────────────────
const euro = n => new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR'}).format(n||0);

function fmtHours(h) {
  const hrs  = Math.floor(h||0);
  const mins = Math.round(((h||0) - hrs) * 60);
  return mins === 0 ? `${hrs}h` : `${hrs}h ${mins}m`;
}

function fmtDate(s) {
  if (!s) return '';
  const [y,m,d] = s.split('-');
  return `${d}/${m}/${y}`;
}

function calcHours(start, end) {
  if (!start || !end) return 0;
  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  let mins = (eh*60+em)-(sh*60+sm);
  if (mins < 0) mins += 1440;
  return Math.round(mins/60*100)/100;
}

function ym(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
}

function clientById(id) { return clients.find(c => c.id === id) || null; }

function destroyChart(key) {
  if (charts[key]) { charts[key].destroy(); delete charts[key]; }
}

function toast(msg, err=false) {
  const el = document.getElementById('toast');
  el.innerHTML = `<span>${err?'✕':'✓'}</span> ${msg}`;
  el.className = `fixed bottom-6 right-6 px-5 py-3 rounded-xl text-white text-sm font-medium z-50 shadow-xl flex items-center gap-2 ${err?'bg-red-500':'bg-emerald-500'}`;
  el.classList.remove('hidden');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.add('hidden'), 3000);
}

// ─── Auth ─────────────────────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('ts_token'); }
function setToken(t) { localStorage.setItem('ts_token', t); }
function clearToken() { localStorage.removeItem('ts_token'); }

function showLogin() {
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('sidebar').classList.add('hidden');
  document.querySelector('main').classList.add('hidden');
  document.getElementById('login-error').classList.add('hidden');
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
}

function hideLogin() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('sidebar').classList.remove('hidden');
  document.querySelector('main').classList.remove('hidden');
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  btn.disabled = true;
  btn.textContent = 'Accesso...';
  errEl.classList.add('hidden');
  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        username: document.getElementById('login-username').value,
        password: document.getElementById('login-password').value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Errore di login');
    setToken(data.token);
    hideLogin();
    await reload();
    navigate('dashboard');
  } catch(err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Accedi';
  }
}

async function handleLogout() {
  try {
    await req('POST', '/auth/logout');
  } catch(_) {}
  clearToken();
  showLogin();
}

async function openSettings() {
  let username = '';
  try { username = (await req('GET', '/auth/me')).username; } catch(_) {}
  document.getElementById('modal-body').innerHTML = `
    <div class="p-6">
      <h2 class="text-lg font-bold text-slate-800 mb-6">Impostazioni Account</h2>

      <!-- Username -->
      <form onsubmit="saveUsername(event)" class="mb-6 pb-6 border-b border-slate-200">
        <label class="block text-sm font-semibold text-slate-700 mb-3">Cambia Username</label>
        <input id="set-username" type="text" value="${username}" required minlength="3"
          class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none text-sm mb-3" />
        <p id="set-username-err" class="hidden text-red-500 text-xs mb-2"></p>
        <button type="submit" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-medium py-2 rounded-lg text-sm transition-colors">Salva Username</button>
      </form>

      <!-- Password -->
      <form onsubmit="savePassword(event)">
        <label class="block text-sm font-semibold text-slate-700 mb-3">Cambia Password</label>
        <input id="set-old-pw" type="password" placeholder="Password attuale" required
          class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none text-sm mb-2" />
        <input id="set-new-pw" type="password" placeholder="Nuova password" required minlength="4"
          class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none text-sm mb-2" />
        <input id="set-new-pw2" type="password" placeholder="Conferma nuova password" required minlength="4"
          class="w-full px-3 py-2 rounded-lg border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none text-sm mb-3" />
        <p id="set-pw-err" class="hidden text-red-500 text-xs mb-2"></p>
        <button type="submit" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-medium py-2 rounded-lg text-sm transition-colors">Salva Password</button>
      </form>

      <button onclick="closeModal()" class="mt-6 w-full text-slate-500 hover:text-slate-700 text-sm font-medium py-2">Chiudi</button>
    </div>`;
  showModal();
}

async function saveUsername(e) {
  e.preventDefault();
  const errEl = document.getElementById('set-username-err');
  errEl.classList.add('hidden');
  try {
    await req('PUT', '/auth/change-username', { new_username: document.getElementById('set-username').value.trim() });
    toast('Username aggiornato');
    closeModal();
  } catch(err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  }
}

async function savePassword(e) {
  e.preventDefault();
  const errEl = document.getElementById('set-pw-err');
  errEl.classList.add('hidden');
  const newPw = document.getElementById('set-new-pw').value;
  const newPw2 = document.getElementById('set-new-pw2').value;
  if (newPw !== newPw2) {
    errEl.textContent = 'Le password non coincidono';
    errEl.classList.remove('hidden');
    return;
  }
  try {
    await req('PUT', '/auth/change-password', {
      old_password: document.getElementById('set-old-pw').value,
      new_password: newPw,
    });
    toast('Password aggiornata');
    closeModal();
  } catch(err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  }
}

// ─── API ──────────────────────────────────────────────────────────────────────
async function req(method, path, body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  const token = getToken();
  if (token) opts.headers['Authorization'] = `Bearer ${token}`;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${API}${path}`, opts);
  if (res.status === 401) { clearToken(); showLogin(); throw new Error('Sessione scaduta'); }
  if (res.status === 204) return null;
  const data = await res.json().catch(()=>({}));
  if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
  return data;
}

async function reload() {
  [clients, sessions, stats, accounts, transactions, finStats, categoriesData] = await Promise.all([
    req('GET','/clients'),
    req('GET','/sessions'),
    req('GET','/stats'),
    req('GET','/accounts'),
    req('GET','/transactions'),
    req('GET','/finance-stats'),
    req('GET','/categories'),
  ]);
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function navigate(v) {
  view = v;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`nav-${v}`)?.classList.add('active');
  Object.keys(charts).forEach(k => destroyChart(k));
  const c = document.getElementById('content');
  switch(v) {
    case 'dashboard':    renderDashboard(c);    break;
    case 'calendar':     renderCalendar(c);     break;
    case 'clients':      renderClients(c);      break;
    case 'sessions':     renderSessions(c);     break;
    case 'accounts':     renderAccounts(c);     break;
    case 'transactions': renderTransactions(c); break;
    case 'categories':   renderCategories(c);   break;
  }
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
// Helper: array di mesi (YYYY-MM) presenti in sessions o transactions
function availableMonths() {
  const set = new Set();
  sessions.forEach(s => set.add(s.date.slice(0,7)));
  transactions.forEach(t => set.add(t.date.slice(0,7)));
  return Array.from(set).sort().reverse();
}

function monthLabel(ym) {
  if (!ym) return 'Tutti i periodi';
  const [y,m] = ym.split('-');
  return `${MONTHS_IT[parseInt(m)-1]} ${y}`;
}

// Per-client period + global aggregates
function clientAggregates(month = '') {
  return clients.map(c => {
    const periodSessions = month
      ? sessions.filter(s => s.client_id === c.id && s.date.startsWith(month))
      : sessions.filter(s => s.client_id === c.id);
    const periodPayments = month
      ? transactions.filter(t => t.type === 'income' && t.client_id === c.id && t.date.startsWith(month))
      : transactions.filter(t => t.type === 'income' && t.client_id === c.id);
    const periodHours    = periodSessions.reduce((a,s) => a + s.hours, 0);
    const periodEarned   = periodHours * c.hourly_rate;
    const periodPaid     = periodPayments.reduce((a,t) => a + t.amount, 0);

    const allSessions    = sessions.filter(s => s.client_id === c.id);
    const allPayments    = transactions.filter(t => t.type === 'income' && t.client_id === c.id);
    const globalEarned   = allSessions.reduce((a,s) => a + s.hours, 0) * c.hourly_rate;
    const globalPaid     = allPayments.reduce((a,t) => a + t.amount, 0);
    const pending        = globalEarned - globalPaid;

    return {
      id: c.id, name: c.name, color: c.color, hourly_rate: c.hourly_rate, account_id: c.account_id,
      periodHours, periodEarned, periodPaid, globalEarned, globalPaid, pending,
    };
  });
}

function setDashboardMonth(v) {
  dashboardMonth = v;
  renderDashboard(document.getElementById('content'));

function toggleIncludePending() {
  includePendingInTotal = !includePendingInTotal;

// Quick action: registra pagamento per un cliente con saldo pendente
function payClient(clientId) {
  const c = clients.find(x => x.id === clientId);
  if (!c) return;
  // Calcola pendente attuale
  const allSessions = sessions.filter(s => s.client_id === clientId);
  const allPayments = transactions.filter(t => t.type === 'income' && t.client_id === clientId);
  const earned = allSessions.reduce((a,s) => a + s.hours, 0) * c.hourly_rate;
  const paid   = allPayments.reduce((a,t) => a + t.amount, 0);
  const pending = Math.max(0, Math.round((earned - paid) * 100) / 100);
  openTransactionModal(null, {
    type: 'income',
    client_id: clientId,
    account_id: c.account_id || null,
    amount: pending,
    description: `Pagamento da ${c.name}`,
  });
}

// ─── Calendar ─────────────────────────────────────────────────────────────────
function renderCalendar(el) {
  const year  = calDate.getFullYear();
  const month = calDate.getMonth();
  const first = new Date(year, month, 1);
  const last  = new Date(year, month+1, 0);
  const today = new Date();

  // Starts on Monday (Italian)
  let dow = first.getDay(); // 0=Sun
  if (dow === 0) dow = 7;
  dow -= 1; // Mon=0

  const ymStr = `${year}-${String(month+1).padStart(2,'0')}`;
  const byDate = {};
  sessions.filter(s => s.date.startsWith(ymStr)).forEach(s => {
    byDate[s.date] = byDate[s.date] || [];
    byDate[s.date].push(s);
  });

  const DAY_LABELS = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
  let cells = '';

  for (let i=0; i<dow; i++) {
    cells += `<div class="cal-cell bg-slate-50/50 rounded-xl border border-slate-100/60"></div>`;
  }

  for (let d=1; d<=last.getDate(); d++) {
    const ds = `${ymStr}-${String(d).padStart(2,'0')}`;
    const ss = byDate[ds] || [];
    const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;
    const totalH = ss.reduce((a,s)=>a+s.hours,0);

    const chips = ss.slice(0,3).map(s => {
      const c = clientById(s.client_id);
      return `<div class="chip px-1.5 py-0.5 rounded-md text-white cursor-pointer truncate"
        style="background:${c?.color||'#94a3b8'}"
        onclick="event.stopPropagation();openSessionModal(${s.id})"
        title="${c?.name||'N/A'}: ${fmtHours(s.hours)}${s.note?' – '+s.note:''}">
        ${(c?.name||'').slice(0,8)} ${fmtHours(s.hours)}
      </div>`;
    }).join('');

    const more = ss.length>3 ? `<div class="text-xs text-slate-400 px-1">+${ss.length-3} altri</div>`:'';

    cells += `
      <div class="cal-cell bg-white rounded-xl border ${isToday?'border-indigo-400 ring-2 ring-indigo-100':'border-slate-100'} p-2 cursor-pointer hover:shadow-sm transition-shadow"
        onclick="openSessionModal(null,'${ds}')">
        <div class="flex items-center justify-between mb-1">
          <span class="text-xs font-semibold ${isToday?'w-5 h-5 bg-indigo-500 text-white rounded-full flex items-center justify-center text-center':'text-slate-500'}">${d}</span>
          ${totalH>0?`<span class="text-xs text-slate-400">${fmtHours(totalH)}</span>`:''}
        </div>
        <div class="space-y-0.5">${chips}${more}</div>
      </div>`;
  }

  el.innerHTML = `
    <div class="mb-7 flex items-center justify-between">
      <div>
        <h2 class="text-2xl font-bold text-slate-800">Calendario</h2>
        <p class="text-slate-500 mt-1 text-sm">Clicca su un giorno per aggiungere una sessione</p>
      </div>
      <button onclick="openSessionModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-indigo-700 transition-colors">
        + Aggiungi Sessione
      </button>
    </div>

    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
      <div class="flex items-center justify-between mb-5">
        <button onclick="calNav(-1)" class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-500 text-lg font-bold">‹</button>
        <h3 class="font-semibold text-slate-800">${MONTHS_IT[month]} ${year}</h3>
        <button onclick="calNav(1)"  class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-500 text-lg font-bold">›</button>
      </div>
      <div class="grid grid-cols-7 gap-1.5 mb-1.5">
        ${DAY_LABELS.map(d=>`<div class="text-center text-xs font-semibold text-slate-400 py-1">${d}</div>`).join('')}
      </div>
      <div class="grid grid-cols-7 gap-1.5">${cells}</div>
    </div>
  `;
}

function calNav(dir) {
  calDate = new Date(calDate.getFullYear(), calDate.getMonth()+dir, 1);
  renderCalendar(document.getElementById('content'));
}

                  ${isExp?'−':isTr?'':'+'} ${euro(t.amount)}

                <td class="py-3 px-4">
                  <div class="flex gap-1 justify-end">
                    <button onclick="openTransactionModal(${t.id})"
                      class="w-7 h-7 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-400 hover:text-slate-600">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>

                    </button>

          <div class="flex gap-2 flex-wrap">
            ${PALETTE.map(col => `

        </button>
      </div>
    </div>
  `;

  showModal();

function pickColor(col) {
  document.getElementById('c-color').value = col;
  document.querySelectorAll('[data-col]').forEach(b => {
    b.classList.remove('ring-2','ring-offset-2','ring-slate-500','scale-110');
  });
  document.querySelector(`[data-col="${col}"]`).classList.add('ring-2','ring-offset-2','ring-slate-500','scale-110');
}

async function saveClient(id) {
  const name     = document.getElementById('c-name').value.trim();
  const rateRaw  = document.getElementById('c-rate').value;
  const rate     = parseFloat(rateRaw);
  const color    = document.getElementById('c-color').value;
  const accSel   = document.getElementById('c-account').value;
  const accountId = accSel ? parseInt(accSel) : null;

  if (!name)                       return toast('Inserisci il nome del cliente', true);
  if (rateRaw === '' || isNaN(rate) || rate < 0) return toast('Inserisci una tariffa oraria valida (0 o più)', true);

  const body = { name, hourly_rate: rate, color, account_id: accountId };

  try {
    if (id) {
      await req('PUT', `/clients/${id}`, body);
      toast('Cliente aggiornato!');
    } else {
      await req('POST', '/clients', body);
      toast('Cliente creato!');
    }
    closeModal();
    await reload();
    navigate(view);
  } catch(e) { toast(e.message, true); }
}

async function confirmDeleteClient(id, name) {
  if (!confirm(`Eliminare il cliente "${name}"?\nVerranno eliminate anche tutte le sue sessioni.`)) return;
  try {
    await req('DELETE', `/clients/${id}`);
    toast('Cliente eliminato');
    await reload();
    navigate(view);
  } catch(e) { toast(e.message, true); }
}

function autoHours() {
  const start = document.getElementById('s-start').value;
  const end   = document.getElementById('s-end').value;
  if (start && end) {
    const h = calcHours(start, end);
    if (h > 0) document.getElementById('s-hours').value = h;
  }
}

async function saveSession(id) {
  const clientId = parseInt(document.getElementById('s-client').value);
  const date     = document.getElementById('s-date').value;
  const start    = document.getElementById('s-start').value || null;
  const end      = document.getElementById('s-end').value   || null;
  const hours    = parseFloat(document.getElementById('s-hours').value);
  const note     = document.getElementById('s-note').value.trim();

  if (!clientId)    return toast('Seleziona un cliente', true);
  if (!date)        return toast('Seleziona una data', true);
  if (!hours||hours<=0) return toast('Inserisci le ore lavorate', true);

  const body = { client_id: clientId, date, start_time: start, end_time: end, hours, note };

  try {
    if (id) {
      await req('PUT', `/sessions/${id}`, body);
      toast('Sessione aggiornata!');
    } else {
      await req('POST', '/sessions', body);
      toast('Sessione aggiunta!');
    }
    closeModal();
    await reload();
    navigate(view);
  } catch(e) { toast(e.message, true); }
}

async function confirmDeleteSession(id) {
  if (!confirm('Eliminare questa sessione?')) return;

    toast('Sessione eliminata');

    navigate(view);
  } catch(e) { toast(e.message, true); }
}

function updateReconcileDiff() {
  const target = parseFloat(document.getElementById('r-target').value);
  const info = document.getElementById('r-diff-info');
  if (isNaN(target)) { info.textContent = 'Inserisci un valore numerico'; return; }
  // Read current balance from previously embedded value (stored on input default)
  // We'll re-derive it from finStats
  // Note: this function is called frequently; keep it simple
  info.textContent = 'Verrà generato un movimento di adeguamento se diverso dal saldo attuale';
}

async function saveReconcile(accountId, currentBalance) {
  const target = parseFloat(document.getElementById('r-target').value);
  const date   = document.getElementById('r-date').value || null;
  const desc   = document.getElementById('r-desc').value.trim() || null;
  if (isNaN(target)) return toast('Inserisci un saldo valido', true);
  if (Math.abs(target - currentBalance) < 0.005) return toast('Il saldo è già allineato', true);
  try {
    await req('POST', `/accounts/${accountId}/reconcile`, {
      target_balance: target,
      date,
      description: desc,
    });
    toast('Saldo ripareggiato');
    closeModal();
    await reload();
    navigate(view);
  } catch(e) { toast(e.message, true); }
}

// When user picks a client in the income transaction modal, auto-fill account
function onTxClientChange() {
  const sel = document.getElementById('t-client');
  if (!sel) return;
  const id = parseInt(sel.value);
  if (!id) return;
  const cl = clients.find(c => c.id === id);
  if (cl?.account_id) {
    const accSel = document.getElementById('t-account');
    if (accSel && !accSel.value) accSel.value = String(cl.account_id);
  }
}

function setTxType(type) {
  document.getElementById('t-type').value = type;
  // Update button styles
  document.querySelectorAll('[data-txtype]').forEach(b => {
    b.className = 'py-2 rounded-xl text-sm font-medium border-2 transition-colors border-slate-200 text-slate-500 hover:bg-slate-50';
  });
  const colors = { expense:'border-red-500 bg-red-50 text-red-600', income:'border-emerald-500 bg-emerald-50 text-emerald-600', transfer:'border-blue-500 bg-blue-50 text-blue-600' };
  const btn = document.querySelector(`[data-txtype="${type}"]`);
  if (btn) btn.className = `py-2 rounded-xl text-sm font-medium border-2 transition-colors ${colors[type]}`;

  // Toggle transfer / category / client fields
  const isTransfer = type === 'transfer';
  const isIncome = type === 'income';
  document.getElementById('t-to-account-row').classList.toggle('hidden', !isTransfer);
  document.getElementById('t-category-row').classList.toggle('hidden', isTransfer);
  const clientRow = document.getElementById('t-client-row');
  if (clientRow) clientRow.classList.toggle('hidden', !isIncome);
  document.getElementById('t-account-label').textContent = isTransfer ? 'Conto Origine *' : 'Conto *';

  // Update category options
  if (!isTransfer) {
    const cats = isIncome ? INCOME_CATS() : EXPENSE_CATS();
    const sel = document.getElementById('t-category');
    const current = sel.value;
    sel.innerHTML = '<option value="">Seleziona categoria…</option>' + cats.map(c => `<option value="${c}" ${c===current?'selected':''}>${c}</option>`).join('');
  }
}

async function saveTransaction(id) {
  const type      = document.getElementById('t-type').value;
  const amount    = parseFloat(document.getElementById('t-amount').value);
  const date      = document.getElementById('t-date').value;
  const accountId = parseInt(document.getElementById('t-account').value);
  const toAccId   = type === 'transfer' ? parseInt(document.getElementById('t-to-account').value) : null;
  const category  = type !== 'transfer' ? document.getElementById('t-category').value : '';
  const desc      = document.getElementById('t-desc').value.trim();
  const clientSelEl = document.getElementById('t-client');
  const clientSel = clientSelEl ? clientSelEl.value : '';
  const clientId  = type === 'income' && clientSel ? parseInt(clientSel) : null;

  if (!amount || amount <= 0)  return toast('Inserisci un importo valido', true);
  if (!date)                   return toast('Seleziona una data', true);
  if (!accountId)              return toast('Seleziona un conto', true);
  if (type === 'transfer' && !toAccId) return toast('Seleziona il conto di destinazione', true);
  if (type === 'transfer' && accountId === toAccId) return toast('I conti devono essere diversi', true);

  const body = { type, amount, date, category, description: desc, account_id: accountId, to_account_id: toAccId, client_id: clientId };

  try {
    if (id) {
      await req('PUT', `/transactions/${id}`, body);
      toast('Movimento aggiornato!');
    } else {
      await req('POST', '/transactions', body);
      toast('Movimento aggiunto!');
    }
    closeModal();
    await reload();
    navigate(view);
  } catch(e) { toast(e.message, true); }
}

async function confirmDeleteTransaction(id) {
  if (!confirm('Eliminare questo movimento?')) return;
  try {
    await req('DELETE', `/transactions/${id}`);
    toast('Movimento eliminato');
    await reload();
    navigate(view);
  } catch(e) { toast(e.message, true); }
}

function closeModal() {

async function exportData() {
  try {
    const data = await req('GET', '/export');
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `timeshift-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('Dati esportati!');
  } catch(e) { toast('Errore export: ' + e.message, true); }
}

async function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';

  if (!confirm('Importare i dati? Tutti i dati attuali verranno sostituiti.')) return;

  try {
    const text = await file.text();
    const data = JSON.parse(text);
    await req('POST', '/import', data);
    toast('Dati importati!');
    await reload();
    navigate(view);
  } catch(e) { toast('Errore import: ' + e.message, true); }
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
(async () => {
  document.getElementById('loading').style.display = 'none';
  if (!getToken()) {
    showLogin();
    return;
  }
  try {
    await reload();
    hideLogin();
    navigate('dashboard');
  } catch(e) {
    if (!getToken()) return; // 401 already handled → login shown
    toast('Impossibile contattare il server: ' + e.message, true);
  }
})();
</script>
