version: '3.8'
services:
  backend:
    build: ./backend
    container_name: timeshift-backend
    volumes:
      - './data:/app/data'
    environment:
      - 'DATABASE_URL=sqlite:////app/data/timeshift.db'
    networks:
      - timeshift-net
      - coolify
    restart: unless-stopped
  frontend:
    build: ./frontend
    depends_on:
      - backend
    networks:
      - timeshift-net
    restart: unless-stopped

networks:
  timeshift-net:
    driver: bridge
  coolify:
    external: true